<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">从想法到上线的开发流程</title>
  <desc id="desc">需求、设计、开发和上线四个阶段由一条持续流动的动画轨道连接。</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#282828"/>
      <stop offset="1" stop-color="#1d2021"/>
    </linearGradient>
    <linearGradient id="track" x1="120" y1="0" x2="780" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fabd2f"/>
      <stop offset="0.5" stop-color="#fe8019"/>
      <stop offset="1" stop-color="#d65d0e"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .track { stroke-dasharray: 6 10; animation: flow 3.6s linear infinite; }
    .runner { animation: travel 6s ease-in-out infinite; }
    .card { transform-box: fill-box; transform-origin: center; animation: breathe 6s ease-in-out infinite; }
    .card.two { animation-delay: -4.5s; }
    .card.three { animation-delay: -3s; }
    .card.four { animation-delay: -1.5s; }
    @keyframes flow { to { stroke-dashoffset: -80; } }
    @keyframes travel {
      0%, 5% { transform: translateX(0); }
      45%, 55% { transform: translateX(660px); }
      95%, 100% { transform: translateX(0); }
    }
    @keyframes breathe {
      0%, 18%, 100% { opacity: 0.72; transform: translateY(0); }
      8% { opacity: 1; transform: translateY(-5px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .track, .runner, .card { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="218" rx="20" fill="url(#background)" stroke="#504945" stroke-width="2"/>
  <text x="450" y="33" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" letter-spacing="2">FROM “MAYBE WE COULD…” TO “IT'S LIVE.”</text>

  <path class="track" d="M120 96 H780" fill="none" stroke="url(#track)" stroke-width="3" stroke-linecap="round"/>
  <g class="runner" filter="url(#glow)">
    <circle cx="120" cy="96" r="7" fill="#fabd2f"/>
    <circle cx="120" cy="96" r="13" fill="none" stroke="#fabd2f" stroke-opacity="0.35"/>
  </g>

  <g class="card one">
    <rect x="62" y="59" width="116" height="74" rx="14" fill="#3c3836" stroke="#fabd2f"/>
    <text x="120" y="90" fill="#fabd2f" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" text-anchor="middle">IDEA</text>
    <text x="120" y="113" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">听懂问题</text>
  </g>
  <g class="card two">
    <rect x="282" y="59" width="116" height="74" rx="14" fill="#3c3836" stroke="#d79921"/>
    <text x="340" y="90" fill="#d79921" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" text-anchor="middle">DESIGN</text>
    <text x="340" y="113" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">拆清边界</text>
  </g>
  <g class="card three">
    <rect x="502" y="59" width="116" height="74" rx="14" fill="#3c3836" stroke="#fe8019"/>
    <text x="560" y="90" fill="#fe8019" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" text-anchor="middle">BUILD</text>
    <text x="560" y="113" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">写进系统</text>
  </g>
  <g class="card four">
    <rect x="722" y="59" width="116" height="74" rx="14" fill="#3c3836" stroke="#d65d0e"/>
    <text x="780" y="90" fill="#fe8019" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" text-anchor="middle">SHIP</text>
    <text x="780" y="113" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">稳定上线</text>
  </g>

  <text x="450" y="177" fill="#ebdbb2" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">需求不是起点文档，部署也不是故事结尾。</text>
  <text x="450" y="200" fill="#928374" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">观察、反馈、迭代，然后再跑一圈。</text>
</svg>
