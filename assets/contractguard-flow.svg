<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-labelledby="title desc">
  <title id="title">ContractGuard 隐私优先审查流程</title>
  <desc id="desc">Word 原文在浏览器本地完成解析、脱敏和确认，只有脱敏文本进入服务端进行 AI 审查，最终在本地合并批注。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#282828"/><stop offset="1" stop-color="#1d2021"/></linearGradient><linearGradient id="rail" x1="90" y1="0" x2="810" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#83a598"/><stop offset=".55" stop-color="#b8bb26"/><stop offset="1" stop-color="#fe8019"/></linearGradient><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.rail{stroke-dasharray:6 10;animation:rail 3.4s linear infinite}.doc{animation:travel 8s ease-in-out infinite}.shield{transform-box:fill-box;transform-origin:center;animation:shield 2.5s ease-in-out infinite}@keyframes rail{to{stroke-dashoffset:-64}}@keyframes travel{0%,7%{opacity:0;transform:translateX(0)}14%,86%{opacity:1}93%,100%{opacity:0;transform:translateX(720px)}}@keyframes shield{0%,100%{transform:scale(.9);opacity:.65}50%{transform:scale(1.08);opacity:1}}@media(prefers-reduced-motion:reduce){.rail,.doc,.shield{animation:none}}</style>
  <rect x="1" y="1" width="898" height="248" rx="20" fill="url(#bg)" stroke="#504945" stroke-width="2"/>
  <path d="M22 48 H507 V228 H22 Z" fill="#458588" fill-opacity=".055"/><path d="M507 48 H878 V228 H507 Z" fill="#d65d0e" fill-opacity=".055"/>
  <text x="45" y="30" fill="#83a598" font-family="Consolas,monospace" font-size="11" letter-spacing="2">LOCAL BROWSER / RAW DOC STAYS HERE</text><text x="855" y="30" fill="#fe8019" font-family="Consolas,monospace" font-size="11" letter-spacing="2" text-anchor="end">SERVER / REDACTED TEXT ONLY</text>
  <path class="rail" d="M90 123 H810" fill="none" stroke="url(#rail)" stroke-width="3"/>
  <g class="doc" filter="url(#glow)"><rect x="82" y="113" width="16" height="20" rx="2" fill="#fabd2f"/></g>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle"><g><rect x="34" y="82" width="112" height="82" rx="13" fill="#3c3836" stroke="#458588"/><text x="90" y="113" fill="#83a598" font-family="Consolas,monospace" font-size="11" font-weight="700">PARSE</text><text x="90" y="138" fill="#d5c4a1" font-size="11">解析 Word</text></g><g><rect x="192" y="82" width="112" height="82" rx="13" fill="#3c3836" stroke="#458588"/><text x="248" y="113" fill="#83a598" font-family="Consolas,monospace" font-size="11" font-weight="700">REDACT</text><text x="248" y="138" fill="#d5c4a1" font-size="11">本地脱敏</text></g><g><rect x="350" y="82" width="112" height="82" rx="13" fill="#3c3836" stroke="#b8bb26"/><text x="406" y="113" fill="#b8bb26" font-family="Consolas,monospace" font-size="11" font-weight="700">CONFIRM</text><text x="406" y="138" fill="#d5c4a1" font-size="11">人工确认</text></g><g><rect x="548" y="82" width="112" height="82" rx="13" fill="#3c3836" stroke="#d79921"/><text x="604" y="113" fill="#fabd2f" font-family="Consolas,monospace" font-size="11" font-weight="700">AI REVIEW</text><text x="604" y="138" fill="#d5c4a1" font-size="11">异步审查</text></g><g><rect x="706" y="82" width="160" height="82" rx="13" fill="#3c3836" stroke="#d65d0e"/><text x="786" y="113" fill="#fe8019" font-family="Consolas,monospace" font-size="11" font-weight="700">MERGE LOCALLY</text><text x="786" y="138" fill="#d5c4a1" font-size="11">定位并合并批注</text></g></g>
  <g class="shield"><path d="M507 74 L523 81 V96 C523 108 516 116 507 121 C498 116 491 108 491 96 V81 Z" fill="#282828" stroke="#b8bb26" stroke-width="2"/><path d="M500 96 L505 101 L515 89" fill="none" stroke="#b8bb26" stroke-width="2" stroke-linecap="round"/></g>
  <text x="450" y="211" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">隐私边界不是一句承诺，而是数据流里真正跨不过去的线。</text>
</svg>
