<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">当前开发与学习重点</title>
  <desc id="desc">展示最近完成的 ContractGuard、正在深化的 JVM 与生产故障治理，以及正在探索的 Agent 工作流。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#282828"/><stop offset="1" stop-color="#1d2021"/></linearGradient><linearGradient id="signal" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#83a598"/><stop offset=".5" stop-color="#fabd2f"/><stop offset="1" stop-color="#fe8019"/></linearGradient><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.status{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-in-out infinite}.line{stroke-dasharray:360;stroke-dashoffset:360;animation:draw 2.4s ease-out forwards}.card{animation:breathe 4.5s ease-in-out infinite}.card.d2{animation-delay:-1.5s}.card.d3{animation-delay:-3s}@keyframes pulse{0%,100%{opacity:.55;transform:scale(.82)}50%{opacity:1;transform:scale(1.18)}}@keyframes draw{to{stroke-dashoffset:0}}@keyframes breathe{0%,100%{opacity:.72}50%{opacity:1}}@media(prefers-reduced-motion:reduce){.status,.line,.card{animation:none}.line{stroke-dashoffset:0}}</style>
  <rect x="1" y="1" width="898" height="218" rx="20" fill="url(#bg)" stroke="#504945" stroke-width="2"/>
  <g><circle class="status" cx="65" cy="47" r="7" fill="#b8bb26" filter="url(#glow)"/><text x="83" y="52" fill="#b8bb26" font-family="Consolas,monospace" font-size="13" font-weight="700">CURRENT FOCUS / BUILD · REVIEW · REFINE</text></g>
  <g class="card" transform="translate(45 76)"><rect width="250" height="91" rx="15" fill="#3c3836" stroke="#458588"/><text x="20" y="28" fill="#928374" font-family="Consolas,monospace" font-size="10">RECENTLY SHIPPED</text><text x="20" y="56" fill="#83a598" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">ContractGuard</text><text x="20" y="77" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11">隐私优先的 AI 合同审查</text></g>
  <g class="card d2" transform="translate(325 76)"><rect width="250" height="91" rx="15" fill="#3c3836" stroke="#d79921"/><text x="20" y="28" fill="#928374" font-family="Consolas,monospace" font-size="10">DEEPENING</text><text x="20" y="56" fill="#fabd2f" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">JVM 与故障治理</text><text x="20" y="77" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11">从指标定位到根因分析</text></g>
  <g class="card d3" transform="translate(605 76)"><rect width="250" height="91" rx="15" fill="#3c3836" stroke="#d65d0e"/><text x="20" y="28" fill="#928374" font-family="Consolas,monospace" font-size="10">EXPLORING</text><text x="20" y="56" fill="#fe8019" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">Agent 工作流</text><text x="20" y="77" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11">Coze · Vibe Coding</text></g>
  <path class="line" d="M270 191 H630" stroke="url(#signal)" stroke-width="3"/><text x="450" y="205" fill="#928374" font-family="Consolas,monospace" font-size="10" text-anchor="middle">keep shipping, keep learning</text>
</svg>
