<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-labelledby="title desc">
  <title id="title">EasyChat 实时通信架构动画</title>
  <desc id="desc">多端客户端通过网关和长连接层进入消息队列与业务服务，并由 Redis 路由和可观测性系统提供支持。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d2021"/><stop offset="1" stop-color="#282828"/></linearGradient><linearGradient id="flow" x1="95" y1="0" x2="805" y2="0" gradientUnits="userSpaceOnUse"><stop stop-color="#83a598"/><stop offset=".5" stop-color="#fabd2f"/><stop offset="1" stop-color="#fe8019"/></linearGradient><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.flow{stroke-dasharray:6 9;animation:flow 3s linear infinite}.packet{animation:packet 7s ease-in-out infinite}.packet.d2{animation-delay:-3.5s}.support{animation:blink 2.6s ease-in-out infinite}.support.d2{animation-delay:-1.3s}@keyframes flow{to{stroke-dashoffset:-60}}@keyframes packet{0%,7%{opacity:0;transform:translateX(0)}15%,84%{opacity:1}93%,100%{opacity:0;transform:translateX(710px)}}@keyframes blink{0%,100%{opacity:.55}50%{opacity:1}}@media(prefers-reduced-motion:reduce){.flow,.packet,.support{animation:none}}</style>
  <rect x="1" y="1" width="898" height="248" rx="20" fill="url(#bg)" stroke="#504945" stroke-width="2"/>
  <text x="450" y="29" fill="#bdae93" font-family="Segoe UI,Arial,sans-serif" font-size="11" letter-spacing="2" text-anchor="middle">EASYCHAT / MESSAGE PATH</text>
  <path class="flow" d="M95 112 H805" fill="none" stroke="url(#flow)" stroke-width="3"/>
  <g class="packet" filter="url(#glow)"><circle cx="95" cy="112" r="5" fill="#83a598"/></g><g class="packet d2" filter="url(#glow)"><circle cx="95" cy="112" r="4" fill="#fabd2f"/></g>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle"><g><rect x="35" y="75" width="120" height="74" rx="13" fill="#3c3836" stroke="#458588"/><text x="95" y="105" fill="#83a598" font-family="Consolas,monospace" font-size="12" font-weight="700">CLIENTS</text><text x="95" y="129" fill="#d5c4a1" font-size="10">Web · PC · Android</text></g><g><rect x="198" y="75" width="120" height="74" rx="13" fill="#3c3836" stroke="#d79921"/><text x="258" y="105" fill="#fabd2f" font-family="Consolas,monospace" font-size="12" font-weight="700">GATEWAY</text><text x="258" y="129" fill="#d5c4a1" font-size="10">Auth · Routing</text></g><g><rect x="361" y="75" width="120" height="74" rx="13" fill="#3c3836" stroke="#d79921"/><text x="421" y="105" fill="#fabd2f" font-family="Consolas,monospace" font-size="12" font-weight="700">NETTY</text><text x="421" y="129" fill="#d5c4a1" font-size="10">WebFlux · Long link</text></g><g><rect x="524" y="75" width="120" height="74" rx="13" fill="#3c3836" stroke="#d65d0e"/><text x="584" y="105" fill="#fe8019" font-family="Consolas,monospace" font-size="12" font-weight="700">RABBITMQ</text><text x="584" y="129" fill="#d5c4a1" font-size="10">Buffer · Decouple</text></g><g><rect x="687" y="75" width="178" height="74" rx="13" fill="#3c3836" stroke="#8ec07c"/><text x="776" y="105" fill="#8ec07c" font-family="Consolas,monospace" font-size="12" font-weight="700">BUSINESS SERVICES</text><text x="776" y="129" fill="#d5c4a1" font-size="10">Message · Group · Feed</text></g></g>
  <path d="M421 149 V188 H300" fill="none" stroke="#665c54"/><path d="M584 149 V188 H700" fill="none" stroke="#665c54"/>
  <g class="support"><rect x="224" y="181" width="152" height="38" rx="10" fill="#282828" stroke="#458588"/><text x="300" y="205" fill="#83a598" font-family="Consolas,monospace" font-size="11" text-anchor="middle">REDIS ROUTING</text></g><g class="support d2"><rect x="624" y="181" width="152" height="38" rx="10" fill="#282828" stroke="#b8bb26"/><text x="700" y="205" fill="#b8bb26" font-family="Consolas,monospace" font-size="11" text-anchor="middle">OBSERVABILITY</text></g>
</svg>
