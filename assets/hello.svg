<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180" role="img" aria-labelledby="title desc">
  <title id="title">ZenSyntax 安静构建页脚动画</title>
  <desc id="desc">带有终端光标、消息气泡和咖啡热气的个人主页收尾横幅。</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3c3836"/>
      <stop offset="1" stop-color="#1d2021"/>
    </linearGradient>
    <radialGradient id="warmth">
      <stop offset="0" stop-color="#fe8019" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#fe8019" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .bubble { animation: float 4s ease-in-out infinite; }
    .dot { animation: dot 1.5s ease-in-out infinite; }
    .dot.two { animation-delay: 0.18s; }
    .dot.three { animation-delay: 0.36s; }
    .steam { stroke-dasharray: 12 9; animation: steam 3s ease-in-out infinite; }
    .steam.two { animation-delay: -1.4s; }
    .cursor { animation: blink 1s steps(2, start) infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.55; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
    @keyframes steam {
      0% { opacity: 0; stroke-dashoffset: 22; transform: translateY(6px); }
      50% { opacity: 0.75; }
      100% { opacity: 0; stroke-dashoffset: -22; transform: translateY(-10px); }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .bubble, .dot, .steam, .cursor { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="178" rx="20" fill="url(#background)" stroke="#504945" stroke-width="2"/>
  <ellipse cx="730" cy="90" rx="220" ry="130" fill="url(#warmth)"/>

  <text x="50" y="58" fill="#fabd2f" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Build quietly. Ship clearly.</text>
  <text x="50" y="88" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="14">把复杂留在系统里，把结果留在页面上。</text>
  <text x="50" y="127" fill="#928374" font-family="Consolas, Monaco, monospace" font-size="13">zen@syntax:~$ still building</text>
  <rect class="cursor" x="281" y="114" width="8" height="17" rx="1" fill="#fe8019"/>

  <g class="bubble">
    <path d="M604 43 H751 A14 14 0 0 1 765 57 V103 A14 14 0 0 1 751 117 H685 L667 133 V117 H604 A14 14 0 0 1 590 103 V57 A14 14 0 0 1 604 43 Z" fill="#282828" stroke="#665c54"/>
    <circle class="dot one" cx="641" cy="81" r="6" fill="#fabd2f"/>
    <circle class="dot two" cx="677" cy="81" r="6" fill="#fe8019"/>
    <circle class="dot three" cx="713" cy="81" r="6" fill="#d65d0e"/>
  </g>

  <g>
    <path d="M797 101 H847 V130 A18 18 0 0 1 829 148 H815 A18 18 0 0 1 797 130 Z" fill="#3c3836" stroke="#d79921" stroke-width="2"/>
    <path d="M847 110 H857 A12 12 0 0 1 857 134 H847" fill="none" stroke="#d79921" stroke-width="2"/>
    <path class="steam one" d="M810 90 C799 76 821 68 810 52" fill="none" stroke="#fabd2f" stroke-width="3" stroke-linecap="round"/>
    <path class="steam two" d="M833 90 C822 75 844 65 833 48" fill="none" stroke="#fe8019" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
