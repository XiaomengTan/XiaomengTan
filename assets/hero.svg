<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-labelledby="title desc">
  <title id="title">ZenSyntax 动态个人横幅</title>
  <desc id="desc">一个带有流动连线、呼吸光点和闪烁光标的终端风格横幅。</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2021"/>
      <stop offset="0.55" stop-color="#282828"/>
      <stop offset="1" stop-color="#3c3836"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fabd2f"/>
      <stop offset="0.52" stop-color="#fe8019"/>
      <stop offset="1" stop-color="#d65d0e"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#fabd2f" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#fabd2f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ebdbb2" stroke-opacity="0.045"/>
    </pattern>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .flow { stroke-dasharray: 7 11; animation: flow 5s linear infinite; }
    .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
    .pulse.delay-1 { animation-delay: -0.9s; }
    .pulse.delay-2 { animation-delay: -1.8s; }
    .cursor { animation: blink 1.05s steps(2, start) infinite; }
    .float { animation: float 4.5s ease-in-out infinite; }
    .float.delay { animation-delay: -2.2s; }
    @keyframes flow { to { stroke-dashoffset: -90; } }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .flow, .pulse, .cursor, .float { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="278" rx="22" fill="url(#background)" stroke="#504945" stroke-width="2"/>
  <rect x="1" y="1" width="898" height="278" rx="22" fill="url(#grid)"/>
  <ellipse cx="748" cy="66" rx="180" ry="135" fill="url(#glow)"/>

  <g opacity="0.72">
    <path class="flow" d="M640 60 C710 18 772 29 840 74" fill="none" stroke="#fabd2f" stroke-width="2"/>
    <path class="flow" d="M675 112 C734 155 794 150 852 112" fill="none" stroke="#fe8019" stroke-width="2"/>
    <circle class="pulse" cx="640" cy="60" r="6" fill="#fabd2f" filter="url(#soft-glow)"/>
    <circle class="pulse delay-1" cx="840" cy="74" r="6" fill="#fe8019" filter="url(#soft-glow)"/>
    <circle class="pulse delay-2" cx="675" cy="112" r="5" fill="#d65d0e" filter="url(#soft-glow)"/>
    <g class="float">
      <rect x="742" y="48" width="54" height="30" rx="8" fill="#3c3836" stroke="#665c54"/>
      <text x="769" y="68" fill="#d5c4a1" font-family="Consolas, Monaco, monospace" font-size="11" text-anchor="middle">API</text>
    </g>
    <g class="float delay">
      <rect x="785" y="112" width="68" height="30" rx="8" fill="#3c3836" stroke="#665c54"/>
      <text x="819" y="132" fill="#d5c4a1" font-family="Consolas, Monaco, monospace" font-size="11" text-anchor="middle">DEPLOY</text>
    </g>
  </g>

  <text x="48" y="65" fill="#ebdbb2" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">SYSTEMS, SHIPPED END TO END.</text>
  <text x="46" y="111" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="750">ZenSyntax</text>
  <text x="48" y="139" fill="#bdae93" font-family="Segoe UI, Arial, sans-serif" font-size="15">Java backend · full-stack delivery · distributed systems</text>

  <g transform="translate(46 170)">
    <rect width="808" height="72" rx="13" fill="#1d2021" stroke="#504945"/>
    <circle cx="18" cy="17" r="4" fill="#cc241d"/>
    <circle cx="32" cy="17" r="4" fill="#d79921"/>
    <circle cx="46" cy="17" r="4" fill="#98971a"/>
    <text x="68" y="22" fill="#928374" font-family="Consolas, Monaco, monospace" font-size="11">zen@syntax:~/ideas</text>
    <text x="20" y="52" fill="#fabd2f" font-family="Consolas, Monaco, monospace" font-size="14">$</text>
    <text x="38" y="52" fill="#ebdbb2" font-family="Consolas, Monaco, monospace" font-size="14">idea → architecture → code → production</text>
    <rect class="cursor" x="386" y="39" width="8" height="17" rx="1" fill="#fe8019"/>
    <text x="785" y="52" fill="#98971a" font-family="Consolas, Monaco, monospace" font-size="12" text-anchor="end">● running</text>
  </g>
</svg>
