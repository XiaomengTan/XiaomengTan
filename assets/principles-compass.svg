<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-labelledby="title desc">
  <title id="title">工程原则罗盘</title>
  <desc id="desc">问题边界、可靠性、架构决策记录、自动化和证据五项原则围绕可长期维护的系统。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#1d2021"/><stop offset="1" stop-color="#282828"/></linearGradient><filter id="glow" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <style>.spoke{stroke-dasharray:4 8;animation:flow 4s linear infinite}.core{transform-box:fill-box;transform-origin:center;animation:pulse 3s ease-in-out infinite}.item{animation:fade 5s ease-in-out infinite}.item.d2{animation-delay:-1s}.item.d3{animation-delay:-2s}.item.d4{animation-delay:-3s}.item.d5{animation-delay:-4s}@keyframes flow{to{stroke-dashoffset:-48}}@keyframes pulse{0%,100%{transform:scale(.94)}50%{transform:scale(1.05)}}@keyframes fade{0%,100%{opacity:.65}50%{opacity:1}}@media(prefers-reduced-motion:reduce){.spoke,.core,.item{animation:none}}</style>
  <rect x="1" y="1" width="898" height="278" rx="20" fill="url(#bg)" stroke="#504945" stroke-width="2"/>
  <g class="spoke" fill="none" stroke="#665c54" stroke-width="2"><path d="M450 140 L190 67"/><path d="M450 140 L710 67"/><path d="M450 140 L760 211"/><path d="M450 140 L450 230"/><path d="M450 140 L140 211"/></g>
  <g class="core" filter="url(#glow)"><circle cx="450" cy="140" r="59" fill="#3c3836" stroke="#fabd2f" stroke-width="2"/><text x="450" y="134" fill="#fabd2f" font-family="Consolas,monospace" font-size="13" font-weight="700" text-anchor="middle">GOOD SYSTEMS</text><text x="450" y="157" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">经得起继续修改</text></g>
  <g class="item"><rect x="90" y="34" width="200" height="66" rx="14" fill="#3c3836" stroke="#458588"/><text x="190" y="61" fill="#83a598" font-family="Consolas,monospace" font-size="12" font-weight="700" text-anchor="middle">BOUNDARIES</text><text x="190" y="82" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">先把问题问清楚</text></g>
  <g class="item d2"><rect x="610" y="34" width="200" height="66" rx="14" fill="#3c3836" stroke="#d65d0e"/><text x="710" y="61" fill="#fe8019" font-family="Consolas,monospace" font-size="12" font-weight="700" text-anchor="middle">RELIABILITY</text><text x="710" y="82" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">异常路径也是主流程</text></g>
  <g class="item d3"><rect x="665" y="178" width="190" height="66" rx="14" fill="#3c3836" stroke="#b8bb26"/><text x="760" y="205" fill="#b8bb26" font-family="Consolas,monospace" font-size="12" font-weight="700" text-anchor="middle">ADR</text><text x="760" y="226" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">记住当时为什么</text></g>
  <g class="item d4"><rect x="355" y="211" width="190" height="52" rx="14" fill="#3c3836" stroke="#d79921"/><text x="450" y="234" fill="#fabd2f" font-family="Consolas,monospace" font-size="12" font-weight="700" text-anchor="middle">AUTOMATE + DOCUMENT</text><text x="450" y="251" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">少手搓，能交接</text></g>
  <g class="item d5"><rect x="45" y="178" width="190" height="66" rx="14" fill="#3c3836" stroke="#8ec07c"/><text x="140" y="205" fill="#8ec07c" font-family="Consolas,monospace" font-size="12" font-weight="700" text-anchor="middle">EVIDENCE</text><text x="140" y="226" fill="#d5c4a1" font-family="Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">做过的拿证据说话</text></g>
</svg>
