<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230" role="img" aria-labelledby="title desc">
  <title id="title">EasyChat 与 ContractGuard 项目脉冲动画</title>
  <desc id="desc">两个项目卡片由中央构建节点连接，数据脉冲向两侧循环流动。</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#282828"/>
      <stop offset="1" stop-color="#1d2021"/>
    </linearGradient>
    <linearGradient id="easy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#458588" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#83a598" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d65d0e" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#fe8019" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .wire { stroke-dasharray: 5 9; animation: wire 3s linear infinite; }
    .wave { stroke-dasharray: 10 7; animation: wave 2.8s linear infinite; }
    .hub { transform-box: fill-box; transform-origin: center; animation: hub 2.4s ease-in-out infinite; }
    .signal-left { animation: signal-left 3.6s ease-in-out infinite; }
    .signal-right { animation: signal-right 3.6s ease-in-out infinite; }
    @keyframes wire { to { stroke-dashoffset: -56; } }
    @keyframes wave { to { stroke-dashoffset: -68; } }
    @keyframes hub {
      0%, 100% { opacity: 0.72; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes signal-left {
      0%, 8% { opacity: 0; transform: translateX(0); }
      20%, 78% { opacity: 1; }
      92%, 100% { opacity: 0; transform: translateX(-118px); }
    }
    @keyframes signal-right {
      0%, 8% { opacity: 0; transform: translateX(0); }
      20%, 78% { opacity: 1; }
      92%, 100% { opacity: 0; transform: translateX(118px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .wire, .wave, .hub, .signal-left, .signal-right { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="228" rx="20" fill="url(#background)" stroke="#504945" stroke-width="2"/>
  <text x="450" y="31" fill="#bdae93" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="2" text-anchor="middle">TWO SYSTEMS, BUILT END TO END</text>

  <rect x="48" y="55" width="330" height="116" rx="17" fill="url(#easy)" stroke="#458588"/>
  <text x="74" y="86" fill="#83a598" font-family="Consolas, Monaco, monospace" font-size="16" font-weight="700">01 / EASYCHAT</text>
  <text x="74" y="111" fill="#ebdbb2" font-family="Segoe UI, Arial, sans-serif" font-size="13">实时通信，不只是“消息发出去了”</text>
  <text x="74" y="141" fill="#928374" font-family="Consolas, Monaco, monospace" font-size="11">15 services · E2EE · Feed · Multi-platform</text>
  <path class="wave" d="M74 154 C90 140 106 168 122 154 S154 140 170 154 S202 168 218 154" fill="none" stroke="#83a598" stroke-width="2"/>

  <rect x="522" y="55" width="330" height="116" rx="17" fill="url(#guard)" stroke="#d65d0e"/>
  <text x="548" y="86" fill="#fe8019" font-family="Consolas, Monaco, monospace" font-size="16" font-weight="700">02 / CONTRACTGUARD</text>
  <text x="548" y="111" fill="#ebdbb2" font-family="Segoe UI, Arial, sans-serif" font-size="13">让 AI 看合同，也让原文留在本地</text>
  <text x="548" y="141" fill="#928374" font-family="Consolas, Monaco, monospace" font-size="11">Local-first · Redaction · Async AI review</text>
  <path class="wave" d="M682 154 C698 140 714 168 730 154 S762 140 778 154 S810 168 826 154" fill="none" stroke="#fe8019" stroke-width="2"/>

  <path class="wire" d="M378 113 H427 M473 113 H522" fill="none" stroke="#fabd2f" stroke-width="2"/>
  <g class="hub" filter="url(#glow)">
    <circle cx="450" cy="113" r="25" fill="#3c3836" stroke="#fabd2f" stroke-width="2"/>
    <text x="450" y="117" fill="#fabd2f" font-family="Consolas, Monaco, monospace" font-size="10" font-weight="700" text-anchor="middle">SHIP</text>
  </g>
  <g class="signal-left" filter="url(#glow)">
    <circle cx="427" cy="113" r="4" fill="#83a598"/>
  </g>
  <g class="signal-right" filter="url(#glow)">
    <circle cx="473" cy="113" r="4" fill="#fe8019"/>
  </g>

  <text x="450" y="204" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">方向不同，共同点是：从问题出发，也负责到系统落地。</text>
</svg>
