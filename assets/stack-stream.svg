<svg xmlns="http://www.w3.org/2000/svg" width="900" height="210" viewBox="0 0 900 210" role="img" aria-labelledby="title desc">
  <title id="title">ZenSyntax 技术栈数据流动画</title>
  <desc id="desc">请求依次流经后端、数据层、交付层和可观测性层，光点沿轨道持续移动。</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2021"/>
      <stop offset="1" stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="stream" x1="122" y1="0" x2="778" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fabd2f"/>
      <stop offset="0.5" stop-color="#fe8019"/>
      <stop offset="1" stop-color="#83a598"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .stream { stroke-dasharray: 6 10; animation: stream 3.4s linear infinite; }
    .packet { animation: packet 7s ease-in-out infinite; }
    .packet.delay { animation-delay: -3.5s; }
    .node { transform-box: fill-box; transform-origin: center; animation: node 4s ease-in-out infinite; }
    .node.two { animation-delay: -1s; }
    .node.three { animation-delay: -2s; }
    .node.four { animation-delay: -3s; }
    @keyframes stream { to { stroke-dashoffset: -80; } }
    @keyframes packet {
      0%, 8% { opacity: 0; transform: translateX(0); }
      14% { opacity: 1; }
      86% { opacity: 1; }
      92%, 100% { opacity: 0; transform: translateX(656px); }
    }
    @keyframes node {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .stream, .packet, .node { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="208" rx="20" fill="url(#background)" stroke="#504945" stroke-width="2"/>
  <text x="450" y="30" fill="#bdae93" font-family="Segoe UI, Arial, sans-serif" font-size="12" letter-spacing="2" text-anchor="middle">A REQUEST'S LITTLE ADVENTURE</text>

  <path class="stream" d="M122 100 H778" fill="none" stroke="url(#stream)" stroke-width="3" stroke-linecap="round"/>
  <g class="packet" filter="url(#glow)">
    <circle cx="122" cy="100" r="5" fill="#fabd2f"/>
  </g>
  <g class="packet delay" filter="url(#glow)">
    <circle cx="122" cy="100" r="4" fill="#8ec07c"/>
  </g>

  <g class="node one">
    <rect x="52" y="61" width="140" height="78" rx="14" fill="#3c3836" stroke="#d79921"/>
    <text x="122" y="91" fill="#fabd2f" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="700" text-anchor="middle">BACKEND</text>
    <text x="122" y="116" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Java · Spring</text>
  </g>
  <g class="node two">
    <rect x="271" y="61" width="140" height="78" rx="14" fill="#3c3836" stroke="#fe8019"/>
    <text x="341" y="91" fill="#fe8019" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="700" text-anchor="middle">DATA</text>
    <text x="341" y="116" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Redis · MQ · SQL</text>
  </g>
  <g class="node three">
    <rect x="489" y="61" width="140" height="78" rx="14" fill="#3c3836" stroke="#b8bb26"/>
    <text x="559" y="91" fill="#b8bb26" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="700" text-anchor="middle">DELIVERY</text>
    <text x="559" y="116" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Vue · Docker · CI</text>
  </g>
  <g class="node four">
    <rect x="708" y="61" width="140" height="78" rx="14" fill="#3c3836" stroke="#83a598"/>
    <text x="778" y="91" fill="#83a598" font-family="Consolas, Monaco, monospace" font-size="14" font-weight="700" text-anchor="middle">OBSERVE</text>
    <text x="778" y="116" fill="#d5c4a1" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">Logs · Metrics · Traces</text>
  </g>

  <text x="450" y="177" fill="#ebdbb2" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">服务跑起来只是第一步，能看见它如何运行才算完整。</text>
</svg>
